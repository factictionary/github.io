<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger Pro | Visual Reordering | Factictionary</title>
    
    <meta name="description" content="Advanced PDF merger with visual drag-and-drop reordering, rotation, reverse pages, bookmarks, and more.">
    
    <!-- Fonts & PDF-lib -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        :root {
            --primary: #F59E0B;
        }
        
        .tool-workspace {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        .drop-zone {
            border: 3px dashed #F59E0B40;
            background: #FFF7ED;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .drop-zone.drag-over {
            background: #FEF3C7;
            border-color: var(--primary);
            transform: scale(1.02);
        }
        
        /* Visual File List */
        #fileItems {
            display: grid;
            gap: 16px;
            margin: 24px 0;
        }
        
        .file-card {
            background: white;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            cursor: move;
            position: relative;
        }
        
        .file-card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.15);
            transform: translateY(-2px);
        }
        
        .file-card.dragging {
            opacity: 0.6;
            transform: scale(0.98) rotate(2deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 100;
        }
        
        .order-number {
            width: 32px;
            height: 32px;
            background: #F59E0B;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .pdf-icon {
            width: 48px;
            height: 48px;
            background: #FEF3C7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        
        .file-name {
            font-weight: 600;
            color: #1F2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-meta {
            font-size: 13px;
            color: #6B7280;
        }
        
        .drag-handle {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9CA3AF;
            font-size: 20px;
            cursor: grab;
        }
        
        .file-card:active .drag-handle {
            cursor: grabbing;
        }
        
        .file-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .file-options select,
        .file-options input {
            font-size: 13px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #D1D5DB;
        }
        
        .btn-remove {
            background: #EF4444;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
        
        .visual-hint {
            text-align: center;
            color: #6B7280;
            font-size: 14px;
            margin: 12px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Keep your existing header and navigation -->

    <main class="tool-main">
        <section class="tool-workspace">
            <div class="drop-zone" id="dropZone">
                <div style="font-size: 3.5rem; margin-bottom: 16px;">📄</div>
                <div style="font-size: 1.1rem; margin-bottom: 12px;">Drop PDF files here or</div>
                <button onclick="document.getElementById('fileInput').click()" 
                        style="background:#F59E0B;color:white;padding:12px 28px;border:none;border-radius:8px;font-weight:600;cursor:pointer;">
                    Browse Files
                </button>
                <input type="file" id="fileInput" multiple accept=".pdf" style="display:none;">
            </div>

            <div id="fileList" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h3>Files to Merge <span id="fileCount" style="color:#F59E0B"></span></h3>
                    <small class="visual-hint">👆 Drag cards to reorder • Drop between files to rearrange</small>
                </div>
                
                <div id="fileItems"></div>
            </div>

            <!-- Rest of your controls (tabs, buttons, etc.) remain the same -->
            <!-- ... (you can keep your previous tab system and merge settings here) ... -->

            <div class="tool-actions" style="margin-top: 30px;">
                <button class="btn-tool" id="processBtn" disabled>🚀 Merge PDFs</button>
                <button class="btn-tool" id="downloadBtn" disabled>⬇️ Download</button>
                <button class="btn-tool" id="resetBtn">Reset</button>
            </div>
        </section>
    </main>

    <script>
        let selectedFiles = [];
        let dragSrcElement = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileItems = document.getElementById('fileItems');
        const fileListContainer = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const processBtn = document.getElementById('processBtn');

        // Drag and Drop on zone
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            const pdfs = Array.from(files).filter(f => f.type === 'application/pdf');
            if (pdfs.length === 0) return alert("Please select only PDF files.");

            pdfs.forEach(file => {
                selectedFiles.push({
                    id: Date.now() + Math.random(),
                    file: file,
                    name: file.name,
                    size: file.size,
                    pages: null,
                    pageRange: '',
                    rotation: 0,
                    reversePages: false,
                    bookmarkName: file.name.replace(/\.pdf$/i, '')
                });
            });

            updateFileList();
        }

        async function loadPageCount(fileData) {
            try {
                const buffer = await fileData.file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(buffer);
                fileData.pages = pdf.getPageCount();
                updateFileList();
            } catch (err) {
                console.error("Failed to load page count", err);
            }
        }

        function formatFileSize(bytes) {
            if (!bytes) return '—';
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + ['B', 'KB', 'MB'][i];
        }

        function updateFileList() {
            fileListContainer.style.display = selectedFiles.length ? 'block' : 'none';
            fileCount.textContent = `(${selectedFiles.length} files)`;
            processBtn.disabled = selectedFiles.length === 0;

            fileItems.innerHTML = '';

            selectedFiles.forEach((fileData, index) => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.draggable = true;
                card.dataset.index = index;

                card.innerHTML = `
                    <div class="order-number">${index + 1}</div>
                    <div class="drag-handle">≡</div>
                    <div class="pdf-icon">📕</div>
                    <div class="file-info">
                        <div class="file-name">${fileData.name}</div>
                        <div class="file-meta">
                            ${formatFileSize(fileData.size)} • 
                            ${fileData.pages ? fileData.pages + ' pages' : 'Loading...'}
                        </div>
                    </div>
                    <div class="file-options">
                        <select onchange="updateFileOption(${fileData.id}, 'rotation', this.value)">
                            <option value="0" ${fileData.rotation==0?'selected':''}>0°</option>
                            <option value="90" ${fileData.rotation==90?'selected':''}>90°</option>
                            <option value="180" ${fileData.rotation==180?'selected':''}>180°</option>
                            <option value="270" ${fileData.rotation==270?'selected':''}>270°</option>
                        </select>
                        <label style="display:flex;align-items:center;gap:4px;font-size:13px;">
                            <input type="checkbox" ${fileData.reversePages?'checked':''} 
                                   onchange="updateFileOption(${fileData.id}, 'reversePages', this.checked)"> Reverse
                        </label>
                    </div>
                    <button class="btn-remove" onclick="removeFile(${fileData.id})">×</button>
                `;

                // Drag events
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragend', handleDragEnd);

                fileItems.appendChild(card);

                if (!fileData.pages) loadPageCount(fileData);
            });
        }

        function updateFileOption(id, key, value) {
            const file = selectedFiles.find(f => f.id === id);
            if (file) file[key] = value;
        }

        function removeFile(id) {
            selectedFiles = selectedFiles.filter(f => f.id !== id);
            updateFileList();
        }

        // ==================== DRAG & DROP REORDERING ====================
        function handleDragStart(e) {
            dragSrcElement = this;
            setTimeout(() => this.classList.add('dragging'), 0);
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            this.style.borderColor = '#F59E0B';
            this.style.background = '#FEFCE8';
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const fromIndex = parseInt(dragSrcElement.dataset.index);
            const toIndex = parseInt(this.dataset.index);

            if (fromIndex !== toIndex) {
                const [movedFile] = selectedFiles.splice(fromIndex, 1);
                selectedFiles.splice(toIndex, 0, movedFile);
            }

            updateFileList();
        }

        function handleDragEnd() {
            document.querySelectorAll('.file-card').forEach(card => {
                card.classList.remove('dragging');
                card.style.borderColor = '';
                card.style.background = '';
            });
        }

        // Reset function
        function resetTool() {
            selectedFiles = [];
            updateFileList();
        }

        // Expose functions to window
        window.removeFile = removeFile;
        window.updateFileOption = updateFileOption;
        window.resetTool = resetTool;

        // Initialize
        document.getElementById('resetBtn').addEventListener('click', resetTool);
    </script>
</body>
</html>
